<main class="app-main">
  <header class="header">
    <div class="title">
      <h1>Probabilistic FX</h1>
      <p>Currency Exchange with Uncertainty Modeling</p>
    </div>

    <div class="powered-by">
      <p>Powered by</p>
      <img src="/signaloid-wordmark-dark.png" alt="Signaloid.io Wordmark" />
    </div>
  </header>

  <div class="container" [class.is-split]="active()">
    <app-config-pane
      class="pane config"
      [active]="active()"
      (convert)="convert()"
      (reset)="reset()"
    />

    @if (active()) {
      <app-result-pane
        class="pane result"
        [result]="result()"
        [ticker]="ticker()"
        [error]="errorMessage()"
        (refresh)="reset()"
        aria-live="polite"
      />
    }
  </div>

  <!-- Note: The following element was generated by an AI assistant -->

    href="https://github.com/pyronlaboratory/Signaloid-Demo-Finance-ProbabilisticFX"
    class="github-fork-btn"

    rel="noopener noreferrer"
    aria-label="Fork this project on GitHub (opens in a new tab)"
  >
